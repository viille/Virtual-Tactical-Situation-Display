name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore tactical-situation-display.sln

      - name: Publish App
        run: dotnet publish src/TacticalDisplay.App/TacticalDisplay.App.csproj -c Release -r win-x64 -o out/app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TacticalDisplay.App-win-x64-exe
          path: out/app/TacticalDisplay.App.exe

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/app/TacticalDisplay.App.exe
