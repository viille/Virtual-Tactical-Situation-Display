name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore tactical-situation-display.sln

      - name: Build
        run: dotnet build tactical-situation-display.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tactical-situation-display.sln --configuration Release --no-build
