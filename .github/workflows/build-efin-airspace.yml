name: Build EFIN Airspace Dataset

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: efin-airspace-builder
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build dataset
        run: dotnet run --project src/TacticalDisplay.AirspaceBuilder/TacticalDisplay.AirspaceBuilder.csproj

      - name: Commit updated dataset
        run: |
          if git diff --quiet -- data/efin.geojson data/metadata.json; then
            echo "No output changes; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/efin.geojson data/metadata.json
          git commit -m "Update EFIN airspace dataset"
          git push
